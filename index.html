<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikacija za vježbanje zbrajanja i oduzimanja za školarce">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Matematika za školarce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
                margin-bottom: 15px;
            }
        }

        .level-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .level-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 25px;
            font-size: 1.5em;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .level-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .level-btn:active {
            transform: translateY(-2px);
        }

        .game-screen {
            display: none;
        }

        .progress {
            background: #f0f0f0;
            height: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .progress {
                margin-bottom: 15px;
                height: 15px;
            }
            
            .container {
                padding: 20px 15px;
            }
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .question {
            font-size: 3em;
            text-align: center;
            margin: 40px 0;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .question {
                font-size: 2em;
                margin: 20px 0 10px 0;
            }
        }

        .question input {
            width: 100px;
            font-size: 1em;
            text-align: center;
            border: 3px solid #667eea;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            background: #f9f9ff;
            caret-color: transparent;
            cursor: pointer;
        }

        .question input:focus {
            outline: none;
            border-color: #764ba2;
            background: white;
        }

        .custom-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }

        @media (max-width: 768px) {
            .custom-keyboard {
                gap: 8px;
                max-width: 260px;
                margin: 10px auto;
            }
        }

        /* Hide custom keyboard on desktop */
        @media (min-width: 768px) {
            .custom-keyboard {
                display: none;
            }
            
            .question input {
                caret-color: auto;
                cursor: text;
            }
        }

        .key-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 20px;
            font-size: 1.8em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            user-select: none;
        }

        @media (max-width: 768px) {
            .key-btn {
                padding: 15px;
                font-size: 1.5em;
            }
        }

        .key-btn:active {
            background: #e0e0e0;
            transform: scale(0.95);
        }

        .key-btn.delete {
            background: #ff6b6b;
            color: white;
            border-color: #ff5252;
        }

        .key-btn.delete:active {
            background: #ff5252;
        }

        .key-btn.zero {
            grid-column: span 2;
        }

        .btn-submit {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 15px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            font-weight: bold;
            transition: transform 0.2s;
        }

        @media (max-width: 768px) {
            .btn-submit {
                padding: 15px 40px;
                font-size: 1.3em;
                margin: 15px auto;
            }
        }

        .btn-submit:hover {
            transform: scale(1.05);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .feedback {
            text-align: center;
            font-size: 2.5em;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .feedback {
                font-size: 1.5em;
                min-height: 50px;
                margin: 10px 0;
            }
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .correct {
            color: #38ef7d;
        }

        .incorrect {
            color: #ff6b6b;
        }

        .results-screen {
            display: none;
        }

        .score {
            text-align: center;
            font-size: 2em;
            margin: 30px 0;
            color: #667eea;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .log-table th, .log-table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .log-table th {
            background: #667eea;
            color: white;
        }

        .log-table tr:nth-child(even) {
            background: #f9f9ff;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 15px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            font-weight: bold;
        }

        .btn-restart:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .question {
                font-size: 2em;
            }
            
            .question input {
                width: 80px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Level Selection Screen -->
        <div id="levelSelection" class="level-selection">
            <h1>🎓 Matematika 🎓</h1>
            <button class="level-btn" onclick="startGame(1)">
                Nivo 1: Brojevi do 10
            </button>
            <button class="level-btn" onclick="startGame(2)">
                Nivo 2: Brojevi 10-20
            </button>
            <button class="level-btn" onclick="startGame(3)">
                Nivo 3: Brojevi do 20
            </button>
            <button class="level-btn" onclick="startGame(4)">
                Nivo 4: Tri broja do 20
            </button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="game-screen">
            <h1 id="levelTitle">Nivo 1: Do 10</h1>
            <div class="progress">
                <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
            <div id="question" class="question"></div>
            
            <!-- Custom Keyboard -->
            <div class="custom-keyboard">
                <button class="key-btn" onclick="addDigit(1)">1</button>
                <button class="key-btn" onclick="addDigit(2)">2</button>
                <button class="key-btn" onclick="addDigit(3)">3</button>
                <button class="key-btn" onclick="addDigit(4)">4</button>
                <button class="key-btn" onclick="addDigit(5)">5</button>
                <button class="key-btn" onclick="addDigit(6)">6</button>
                <button class="key-btn" onclick="addDigit(7)">7</button>
                <button class="key-btn" onclick="addDigit(8)">8</button>
                <button class="key-btn" onclick="addDigit(9)">9</button>
                <button class="key-btn delete" onclick="deleteDigit()">⌫</button>
                <button class="key-btn zero" onclick="addDigit(0)">0</button>
            </div>
            
            <button id="submitBtn" class="btn-submit" onclick="checkAnswer()">Provjeri</button>
            <div id="feedback" class="feedback"></div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="results-screen">
            <h1>🎉 Rezultati 🎉</h1>
            <div id="score" class="score"></div>
            <div style="overflow-x: auto;">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Zadatak</th>
                            <th>Tvoj odgovor</th>
                            <th>Točan odgovor</th>
                            <th>Rezultat</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                    </tbody>
                </table>
            </div>
            <button class="btn-restart" onclick="restartGame()">Nova vježba</button>
            <button class="btn-restart" onclick="backToLevels()">Natrag na nivoe</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentQuestion = 0;
        let totalQuestions = 10;
        let score = 0;
        let sessionLog = [];
        let currentTask = {};

        function addDigit(digit) {
            const input = document.getElementById('answer');
            if (input) {
                const currentValue = input.value;
                // Limit to 2 digits max
                if (currentValue.length < 2) {
                    input.value = currentValue + digit;
                }
            }
        }

        function deleteDigit() {
            const input = document.getElementById('answer');
            if (input) {
                input.value = input.value.slice(0, -1);
            }
        }

        function generateThreeNumberQuestion() {
            // Generate three-number operation: a op1 b op2 c = result
            // Operations can be + or -
            // All intermediate and final results must be 0-20
            
            const op1 = Math.random() < 0.5 ? 'add' : 'subtract';
            const op2 = Math.random() < 0.5 ? 'add' : 'subtract';
            const unknownPosition = Math.floor(Math.random() * 4); // 0: a, 1: b, 2: c, 3: result
            
            let a, b, c, intermediate, result;
            let attempts = 0;
            const maxAttempts = 100;
            
            // Generate valid numbers
            do {
                a = Math.floor(Math.random() * 21); // 0-20
                b = Math.floor(Math.random() * 21); // 0-20
                c = Math.floor(Math.random() * 21); // 0-20
                
                // Calculate intermediate and final result
                intermediate = op1 === 'add' ? a + b : a - b;
                result = op2 === 'add' ? intermediate + c : intermediate - c;
                
                attempts++;
                if (attempts > maxAttempts) {
                    // Fallback to simple valid case
                    a = 10;
                    b = 5;
                    c = 3;
                    intermediate = op1 === 'add' ? 15 : 5;
                    result = op2 === 'add' ? intermediate + c : intermediate - c;
                    break;
                }
            } while (intermediate < 0 || intermediate > 20 || result < 0 || result > 20);
            
            let correctAnswer;
            switch(unknownPosition) {
                case 0: correctAnswer = a; break;
                case 1: correctAnswer = b; break;
                case 2: correctAnswer = c; break;
                case 3: correctAnswer = result; break;
            }
            
            return {
                threeNumbers: true,
                operation1: op1,
                operation2: op2,
                a: a,
                b: b,
                c: c,
                result: result,
                unknownPosition: unknownPosition,
                correctAnswer: correctAnswer
            };
        }

        function startGame(level) {
            currentLevel = level;
            currentQuestion = 0;
            score = 0;
            sessionLog = [];
            
            document.getElementById('levelSelection').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            
            if (level === 1) {
                document.getElementById('levelTitle').textContent = 'Nivo 1: Do 10';
            } else if (level === 2) {
                document.getElementById('levelTitle').textContent = 'Nivo 2: Brojevi 10-20';
            } else if (level === 3) {
                document.getElementById('levelTitle').textContent = 'Nivo 3: Brojevi do 20';
            } else {
                document.getElementById('levelTitle').textContent = 'Nivo 4: Tri broja do 20';
            }
            
            nextQuestion();
        }

        function generateQuestion() {
            if (currentLevel === 4) {
                return generateThreeNumberQuestion();
            }
            
            const operation = Math.random() < 0.5 ? 'add' : 'subtract';
            const unknownPosition = Math.floor(Math.random() * 3); // 0: first, 1: second, 2: result
            
            let a, b, result;
            
            if (currentLevel === 1) {
                // Level 1: Numbers 0-10, results max 10
                if (operation === 'add') {
                    result = Math.floor(Math.random() * 11); // 0-10
                    a = Math.floor(Math.random() * (result + 1));
                    b = result - a;
                } else {
                    a = Math.floor(Math.random() * 11); // 0-10
                    b = Math.floor(Math.random() * (a + 1));
                    result = a - b;
                }
            } else if (currentLevel === 2) {
                // Level 2: Numbers 10-20, at least one number must be >= 10
                if (operation === 'add') {
                    // Result between 10-20
                    result = 10 + Math.floor(Math.random() * 11); // 10-20
                    // Make sure at least one operand is >= 10
                    if (Math.random() < 0.5) {
                        a = 10 + Math.floor(Math.random() * (result - 9)); // at least 10
                        b = result - a;
                    } else {
                        b = 10 + Math.floor(Math.random() * (result - 9)); // at least 10
                        a = result - b;
                    }
                } else {
                    // Minuend between 10-20
                    a = 10 + Math.floor(Math.random() * 11); // 10-20
                    b = Math.floor(Math.random() * (a - 9)) + 1; // Ensure result >= 0 and subtrahend > 0
                    result = a - b;
                }
            } else {
                // Level 3: Crossing tens with numbers below 10
                if (operation === 'add') {
                    // Result between 11-20 (crossing the tens barrier)
                    result = 11 + Math.floor(Math.random() * 10); // 11-20
                    // Both operands should be below 10, but sum crosses 10
                    a = Math.floor(Math.random() * 10); // 0-9
                    b = result - a;
                    // If b is >= 10, swap to ensure both are single digits
                    if (b >= 10) {
                        let temp = a;
                        a = b;
                        b = temp;
                    }
                    // Ensure at least one number is > 5 to make crossing tens likely
                    if (a + b <= 10) {
                        a = 6 + Math.floor(Math.random() * 4); // 6-9
                        b = (11 + Math.floor(Math.random() * 10)) - a; // ensure result 11-20
                    }
                } else {
                    // Minuend between 11-20, subtrahend makes result cross back below 10
                    a = 11 + Math.floor(Math.random() * 10); // 11-20
                    // Result should be < 10
                    result = Math.floor(Math.random() * 10); // 0-9
                    b = a - result;
                }
            }
            
            return {
                operation: operation,
                a: a,
                b: b,
                result: result,
                unknownPosition: unknownPosition,
                correctAnswer: unknownPosition === 0 ? a : (unknownPosition === 1 ? b : result)
            };
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                showResults();
                return;
            }
            
            currentTask = generateQuestion();
            currentQuestion++;
            
            updateProgress();
            displayQuestion();
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('submitBtn').disabled = false;
        }

        function updateProgress() {
            const percentage = (currentQuestion / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        function displayQuestion() {
            const isMobile = window.innerWidth < 768;
            
            if (currentTask.threeNumbers) {
                const { operation1, operation2, a, b, c, result, unknownPosition } = currentTask;
                const symbol1 = operation1 === 'add' ? '+' : '−';
                const symbol2 = operation2 === 'add' ? '+' : '−';
                
                let questionHTML = '';
                const inputAttrs = isMobile ? 'type="tel" inputmode="none" readonly' : 'type="number" autofocus';
                
                if (unknownPosition === 0) {
                    questionHTML = `<input ${inputAttrs} id="answer"> ${symbol1} ${b} ${symbol2} ${c} = ${result}`;
                } else if (unknownPosition === 1) {
                    questionHTML = `${a} ${symbol1} <input ${inputAttrs} id="answer"> ${symbol2} ${c} = ${result}`;
                } else if (unknownPosition === 2) {
                    questionHTML = `${a} ${symbol1} ${b} ${symbol2} <input ${inputAttrs} id="answer"> = ${result}`;
                } else {
                    questionHTML = `${a} ${symbol1} ${b} ${symbol2} ${c} = <input ${inputAttrs} id="answer">`;
                }
                
                document.getElementById('question').innerHTML = questionHTML;
            } else {
                const { operation, a, b, result, unknownPosition } = currentTask;
                const symbol = operation === 'add' ? '+' : '−';
                
                let questionHTML = '';
                const inputAttrs = isMobile ? 'type="tel" inputmode="none" readonly' : 'type="number" autofocus';
                
                if (unknownPosition === 0) {
                    questionHTML = `<input ${inputAttrs} id="answer"> ${symbol} ${b} = ${result}`;
                } else if (unknownPosition === 1) {
                    questionHTML = `${a} ${symbol} <input ${inputAttrs} id="answer"> = ${result}`;
                } else {
                    questionHTML = `${a} ${symbol} ${b} = <input ${inputAttrs} id="answer">`;
                }
                
                document.getElementById('question').innerHTML = questionHTML;
            }
            
            // Add enter key support for desktop
            if (!isMobile) {
                document.getElementById('answer').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkAnswer();
                    }
                });
            }
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const correctAnswer = currentTask.correctAnswer;
            
            if (isNaN(userAnswer)) {
                return;
            }
            
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                score++;
            }
            
            // Log the question
            let questionText = '';
            
            if (currentTask.threeNumbers) {
                const { operation1, operation2, a, b, c, result, unknownPosition } = currentTask;
                const symbol1 = operation1 === 'add' ? '+' : '−';
                const symbol2 = operation2 === 'add' ? '+' : '−';
                
                if (unknownPosition === 0) {
                    questionText = `? ${symbol1} ${b} ${symbol2} ${c} = ${result}`;
                } else if (unknownPosition === 1) {
                    questionText = `${a} ${symbol1} ? ${symbol2} ${c} = ${result}`;
                } else if (unknownPosition === 2) {
                    questionText = `${a} ${symbol1} ${b} ${symbol2} ? = ${result}`;
                } else {
                    questionText = `${a} ${symbol1} ${b} ${symbol2} ${c} = ?`;
                }
            } else {
                const { operation, a, b, result, unknownPosition } = currentTask;
                const symbol = operation === 'add' ? '+' : '−';
                
                if (unknownPosition === 0) {
                    questionText = `? ${symbol} ${b} = ${result}`;
                } else if (unknownPosition === 1) {
                    questionText = `${a} ${symbol} ? = ${result}`;
                } else {
                    questionText = `${a} ${symbol} ${b} = ?`;
                }
            }
            
            sessionLog.push({
                question: questionText,
                userAnswer: userAnswer,
                correctAnswer: correctAnswer,
                isCorrect: isCorrect
            });
            
            // Show feedback
            const feedbackDiv = document.getElementById('feedback');
            if (isCorrect) {
                feedbackDiv.innerHTML = '<div class="emoji">😊</div><div class="correct">Točno!</div>';
            } else {
                feedbackDiv.innerHTML = `<div class="emoji">😢</div><div class="incorrect">Netočno! Točan odgovor: ${correctAnswer}</div>`;
            }
            
            document.getElementById('submitBtn').disabled = true;
            
            // Hide keyboard on mobile to show feedback
            const keyboard = document.querySelector('.custom-keyboard');
            if (keyboard && window.innerWidth < 768) {
                keyboard.style.display = 'none';
            }
            
            // Move to next question after delay
            setTimeout(() => {
                // Show keyboard again for next question
                if (keyboard && window.innerWidth < 768) {
                    keyboard.style.display = 'grid';
                }
                nextQuestion();
            }, 3000);
        }

        function showResults() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            
            const percentage = Math.round((score / totalQuestions) * 100);
            document.getElementById('score').innerHTML = `
                Tvoj rezultat: ${score}/${totalQuestions} (${percentage}%)
                ${percentage === 100 ? '<br>🌟 Savršeno! 🌟' : percentage >= 70 ? '<br>👍 Odlično!' : '<br>💪 Vježbaj još!'}
            `;
            
            // Fill the log table
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';
            
            sessionLog.forEach((log, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = index + 1;
                row.insertCell(1).textContent = log.question;
                row.insertCell(2).textContent = log.userAnswer;
                row.insertCell(3).textContent = log.correctAnswer;
                const resultCell = row.insertCell(4);
                resultCell.textContent = log.isCorrect ? '✓' : '✗';
                resultCell.style.color = log.isCorrect ? '#38ef7d' : '#ff6b6b';
                resultCell.style.fontWeight = 'bold';
                resultCell.style.fontSize = '1.5em';
            });
        }

        function restartGame() {
            startGame(currentLevel);
        }

        function backToLevels() {
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('levelSelection').style.display = 'flex';
        }

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
    </script>
</body>
</html>
